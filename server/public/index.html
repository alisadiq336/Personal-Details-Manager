<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personal Details Manager API</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b0d12;
        color: #e6e8ee;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
      }
      main {
        text-align: center;
        padding: 2rem;
      }
      .status {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 999px;
        background: #10331f;
        color: #4ade80;
        font-size: 0.85rem;
        margin-bottom: 1rem;
      }
      code {
        background: #161a22;
        padding: 0.15rem 0.4rem;
        border-radius: 6px;
      }
      a { color: #7aa2ff; }
    </style>
  </head>
  <body>
    <main>
      <div class="status">● API is running</div>
      <h1>Personal Details Manager</h1>
      <p>This is the backend API. Try <a href="/api/health">/api/health</a>.</p>
    </main>
  </body>
</html>
