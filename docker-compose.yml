services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pdm_user
      POSTGRES_PASSWORD: pdm_password
      POSTGRES_DB: personal_details_manager
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdm_user -d personal_details_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
